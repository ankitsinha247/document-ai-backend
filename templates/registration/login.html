<!DOCTYPE html>
<html>
<head>
    <title>Document AI Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .login-card{
            max-width:400px;
            margin:100px auto;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>

<div class="card login-card">

    <div class="card-header bg-primary text-white">
        <h3>🤖 Document AI Login</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary w-100">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
